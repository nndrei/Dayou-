<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        
        <div class="info-box">
            <img src="profilePicture.png" alt="Profile Picture">

            <div class="info">
                <h2>Andrei Chayne D. Montanez</h2>
            </div>

            <div class="bio">
                <p>Computer Engineering student & DOST Scholar with experience in IT automation, machine learning, and full-stack web development. Passionate about building intelligent software and data-driven applications.</p>
            </div>
        </div>

        <div class="btn-box">
            <a href="https://www.facebook.com/montanez.andrei/" target="_blank"><button class="facebook">Facebook</button></a>
            <a href="https://www.linkedin.com/in/andreichaynemontanez/"><button class="linkedIn">LinkedIn</button></a>          
        </div>
        
    </div>
</body>
</html>
